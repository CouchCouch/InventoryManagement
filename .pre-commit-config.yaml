repos:
  - repo: local
    hooks:
      - id: make-fmt
        name: Format Code (make fmt)
        entry: make fmt
        language: system
        pass_filenames: false
        always_run: true

      - id: make-lint
        name: Lint Code (make lint)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true

      - id: make-build
        name: Build Project (make build)
        entry: make build
        language: system
        pass_filenames: false
        always_run: true
